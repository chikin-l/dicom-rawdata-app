name: bmeis-dicom
services:

  dicom-rawdata-app:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: chikinl/dicom-rawdata-app:latest
    container_name: dicom-rawdata-app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
